          type: string
        candlestickPattern:
          type: ["string", "null"]
          description: "head_and_shoulders | inverse_head_and_shoulders | cup_and_handle | triple_top | triple_bottom"
        timeFrame:
          type: ["string", "null"]
          description: "daily_5min | 15min | 4hr_30min"
        volumeIncreaseLevel:
          type: ["string", "null"]
          description: "small | medium | large"
        rsi:
