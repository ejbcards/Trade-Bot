          type: ["string", "null"]
        volumeCondition:
          type: ["string", "null"]
        trendCondition:
          type: ["string", "null"]
        aiSignal:
          type: ["string", "null"]
        aiConfidenceMin:
          type: ["number", "null"]
        priceChangeMin:
          type: ["number", "null"]
        priceChangeMax:
          type: ["number", "null"]
        action:
          type: string
        quantityMultiplier:
          type: number
        notes:
          type: ["string", "null"]

    MarketSnapshot:
