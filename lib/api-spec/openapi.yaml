    # ── Trades ──────────────────────────────────────────────────────
    Trade:
      type: object
      properties:
        id:
          type: integer
        brokerId:
          type: integer
        brokerName:
          type: string
        strategyId:
          type: ["integer", "null"]
        strategyName:
          type: ["string", "null"]
        symbol:
          type: string
        assetType:
          type: string
        side:
          type: string
          description: "buy | sell | buy_to_open | sell_to_close"
        quantity:
          type: number
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        realizedPnl:
          type: ["number", "null"]
        realizedPnlPercent:
          type: ["number", "null"]
        status:
          type: string
          description: "open | closed | cancelled"
        aiSignal:
          type: ["string", "null"]
          description: "buy | sell | hold"
        aiConfidence:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        openedAt:
          type: string
        closedAt:
          type: ["string", "null"]
      required: [id, brokerId, brokerName, symbol, assetType, side, quantity, entryPrice, status, openedAt]

    # ── Decision Rules ──────────────────────────────────────────────
    DecisionRule:
      type: object
      properties:
        id:
          type: integer
        strategyId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        priority:
          type: integer
        isActive:
          type: boolean
        candlestickPattern:
          type: ["string", "null"]
          description: "head_and_shoulders | inverse_head_and_shoulders | cup_and_handle | triple_top | triple_bottom | any"
        timeFrame:
          type: ["string", "null"]
          description: "daily_5min | 15min | 4hr_30min | any"
        volumeIncreaseLevel:
          type: ["string", "null"]
          description: "small | medium | large | any  (S=15%, M=20%, L=30%)"
        rsiMin:
          type: ["number", "null"]
        rsiMax:
          type: ["number", "null"]
        maCondition:
          type: ["string", "null"]
          description: "bullish_cross | bearish_cross | above_fast | below_slow | any"
        volumeCondition:
          type: ["string", "null"]
          description: "high | normal | low | any"
        trendCondition:
          type: ["string", "null"]
          description: "uptrend | downtrend | sideways | any"
        aiSignal:
          type: ["string", "null"]
          description: "buy | sell | hold | any"
        aiConfidenceMin:
          type: ["number", "null"]
        priceChangeMin:
          type: ["number", "null"]
        priceChangeMax:
          type: ["number", "null"]
        action:
          type: string
          description: "buy | sell | hold | watchlist"
        quantityMultiplier:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, strategyId, name, priority, isActive, action, quantityMultiplier, createdAt, updatedAt]

    CreateDecisionRuleBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        priority:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        candlestickPattern:
          type: ["string", "null"]
        timeFrame:
          type: ["string", "null"]
        volumeIncreaseLevel:
          type: ["string", "null"]
        rsiMin:
          type: ["number", "null"]
        rsiMax:
          type: ["number", "null"]
        maCondition:
          type: ["string", "null"]
        volumeCondition:
          type: ["string", "null"]
        trendCondition:
          type: ["string", "null"]
        aiSignal:
          type: ["string", "null"]
        aiConfidenceMin:
          type: ["number", "null"]
        priceChangeMin:
          type: ["number", "null"]
        priceChangeMax:
          type: ["number", "null"]
        action:
          type: string
        quantityMultiplier:
          type: number
          default: 1
        notes:
          type: ["string", "null"]
      required: [name, action]

    UpdateDecisionRuleBody:
      type: object
