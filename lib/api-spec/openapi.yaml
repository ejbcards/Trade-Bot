openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Trading Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: brokers
    description: Broker account connections
  - name: strategies
    description: Trading strategy configuration
  - name: trades
    description: Trade history and execution
  - name: positions
    description: Current open positions
  - name: bot
    description: Bot control and status
  - name: reports
    description: Performance reports
  - name: dashboard
    description: Dashboard summary data
  - name: anthropic
    description: Anthropic AI chat operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Broker Connections ────────────────────────────────────────────
  /brokers:
    get:
      operationId: listBrokers
      tags: [brokers]
      summary: List all broker connections
      responses:
        "200":
          description: List of broker connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerConnection"
    post:
      operationId: createBroker
      tags: [brokers]
      summary: Add a broker connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrokerBody"
      responses:
        "201":
          description: Broker connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnection"

  /brokers/{id}:
    get:
      operationId: getBroker
      tags: [brokers]
      summary: Get a broker connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broker connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnection"
        "404":
          description: Not found
    patch:
      operationId: updateBroker
      tags: [brokers]
      summary: Update broker credentials or settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrokerBody"
      responses:
        "200":
          description: Updated broker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnection"
    delete:
      operationId: deleteBroker
      tags: [brokers]
      summary: Remove a broker connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /brokers/{id}/test:
    post:
      operationId: testBrokerConnection
      tags: [brokers]
      summary: Test broker API connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  # ── Trading Strategies ────────────────────────────────────────────
  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List all trading strategies
      responses:
        "200":
          description: List of strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"
    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a new trading strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStrategyBody"
      responses:
        "201":
          description: Created strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "404":
          description: Not found
    patch:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStrategyBody"
      responses:
        "200":
          description: Updated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
    delete:
      operationId: deleteStrategy
      tags: [strategies]
      summary: Delete a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Decision Rules ────────────────────────────────────────────────
  /strategies/{id}/decision-rules:
    get:
      operationId: listDecisionRules
      tags: [strategies]
      summary: List decision rules for a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of decision rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DecisionRule"
    post:
      operationId: createDecisionRule
      tags: [strategies]
      summary: Create a decision rule for a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDecisionRuleBody"
      responses:
        "201":
          description: Created decision rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionRule"

  /strategies/{id}/decision-rules/{ruleId}:
    patch:
      operationId: updateDecisionRule
      tags: [strategies]
      summary: Update a decision rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ruleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDecisionRuleBody"
      responses:
        "200":
          description: Updated decision rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionRule"
    delete:
      operationId: deleteDecisionRule
      tags: [strategies]
      summary: Delete a decision rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ruleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /strategies/{id}/evaluate:
    post:
      operationId: evaluateStrategy
      tags: [strategies]
      summary: Test decision table with a market snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketSnapshot"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationResult"

  # ── Bot Control ───────────────────────────────────────────────────
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot running status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the trading bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBotBody"
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the trading bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get recent bot activity logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Bot logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotLog"

  # ── Positions ─────────────────────────────────────────────────────
  /positions:
    get:
      operationId: listPositions
      tags: [positions]
      summary: List all open positions
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /positions/summary:
    get:
      operationId: getPositionsSummary
      tags: [positions]
      summary: Get positions summary (totals, P&L)
      responses:
        "200":
          description: Positions summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionsSummary"

  # ── Trades ────────────────────────────────────────────────────────
  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trade history
      parameters:
        - name: brokerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: strategyId
          in: query
          schema:
            type: ["integer", "null"]
        - name: symbol
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Trade history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get a single trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found

  # ── Reports ───────────────────────────────────────────────────────
  /reports/performance:
    get:
      operationId: getPerformanceReport
      tags: [reports]
      summary: Get performance report for a period
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, quarterly, annually]
        - name: brokerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: strategyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Performance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceReport"

  /reports/pnl-chart:
    get:
      operationId: getPnlChart
      tags: [reports]
      summary: Get P&L chart data points
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, quarterly, annually]
        - name: brokerId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: P&L time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PnlDataPoint"

  /reports/win-rate:
    get:
      operationId: getWinRateStats
      tags: [reports]
      summary: Get win/loss statistics
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, quarterly, annually]
      responses:
        "200":
          description: Win rate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WinRateStats"

  /reports/top-symbols:
    get:
      operationId: getTopSymbols
      tags: [reports]
      summary: Get best and worst performing symbols
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, quarterly, annually]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top performing symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymbolPerformance"

  # ── Anthropic Chat ────────────────────────────────────────────────
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  # ── Dashboard ─────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent trades and bot events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Broker ──────────────────────────────────────────────────────
    BrokerConnection:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brokerType:
          type: string
          description: "schwab | robinhood | alpaca | interactive_brokers"
        status:
          type: string
          description: "connected | disconnected | error"
        accountId:
          type: ["string", "null"]
        accountValue:
          type: ["number", "null"]
        buyingPower:
          type: ["number", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, brokerType, status, isActive, createdAt, updatedAt]

    CreateBrokerBody:
      type: object
      properties:
        name:
          type: string
        brokerType:
          type: string
        apiKey:
          type: ["string", "null"]
        apiSecret:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        refreshToken:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
        isActive:
          type: boolean
      required: [name, brokerType]

    UpdateBrokerBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        apiKey:
          type: ["string", "null"]
        apiSecret:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        refreshToken:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    ConnectionTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        accountId:
          type: ["string", "null"]
        accountValue:
          type: ["number", "null"]
      required: [success, message]

    # ── Strategy ────────────────────────────────────────────────────
    Strategy:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        brokerId:
          type: integer
        assetType:
          type: string
          description: "stocks | options | crypto | etf"
        symbols:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        maxPositionSize:
          type: number
          description: "Max $ per position"
        maxDailyLoss:
          type: number
          description: "Max daily loss in $"
        stopLossPercent:
          type: number
          description: "Stop loss as % from entry"
        takeProfitPercent:
          type: number
          description: "Take profit as % from entry"
        aiEnabled:
          type: boolean
        aiModel:
          type: ["string", "null"]
        aiSignalThreshold:
          type: number
          description: "Minimum AI confidence 0-1"
        rsiOverbought:
          type: ["number", "null"]
        rsiOversold:
          type: ["number", "null"]
        maFastPeriod:
          type: ["integer", "null"]
        maSlowPeriod:
          type: ["integer", "null"]
        tradeCount:
          type: integer
        winRate:
          type: ["number", "null"]
        totalPnl:
          type: ["number", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, brokerId, assetType, symbols, isActive, maxPositionSize, maxDailyLoss, stopLossPercent, takeProfitPercent, aiEnabled, aiSignalThreshold, tradeCount, createdAt, updatedAt]

    CreateStrategyBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        brokerId:
          type: integer
        assetType:
          type: string
        symbols:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        maxPositionSize:
          type: number
        maxDailyLoss:
          type: number
        stopLossPercent:
          type: number
        takeProfitPercent:
          type: number
        aiEnabled:
          type: boolean
        aiModel:
          type: ["string", "null"]
        aiSignalThreshold:
          type: number
        rsiOverbought:
          type: ["number", "null"]
        rsiOversold:
          type: ["number", "null"]
        maFastPeriod:
          type: ["integer", "null"]
        maSlowPeriod:
          type: ["integer", "null"]
      required: [name, brokerId, assetType, symbols, maxPositionSize, maxDailyLoss, stopLossPercent, takeProfitPercent, aiSignalThreshold]

    UpdateStrategyBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        symbols:
          type: ["array", "null"]
          items:
            type: string
        isActive:
          type: ["boolean", "null"]
        maxPositionSize:
          type: ["number", "null"]
        maxDailyLoss:
          type: ["number", "null"]
        stopLossPercent:
          type: ["number", "null"]
        takeProfitPercent:
          type: ["number", "null"]
        aiEnabled:
          type: ["boolean", "null"]
        aiSignalThreshold:
          type: ["number", "null"]
        rsiOverbought:
          type: ["number", "null"]
        rsiOversold:
          type: ["number", "null"]
        maFastPeriod:
          type: ["integer", "null"]
        maSlowPeriod:
          type: ["integer", "null"]

    # ── Bot ─────────────────────────────────────────────────────────
    BotStatus:
      type: object
      properties:
        isRunning:
          type: boolean
        startedAt:
          type: ["string", "null"]
        activeStrategyId:
          type: ["integer", "null"]
        activeBrokerId:
          type: ["integer", "null"]
        tradesExecutedToday:
          type: integer
        dailyPnl:
          type: number
        lastHeartbeat:
          type: ["string", "null"]
        scheduledStartAt:
          type: ["string", "null"]
          description: "ISO timestamp of next scheduled market-open start (9:30 AM ET)"
        scheduledStopAt:
          type: ["string", "null"]
          description: "ISO timestamp of next scheduled market-close stop (4:00 PM ET)"
      required: [isRunning, tradesExecutedToday, dailyPnl]

    StartBotBody:
      type: object
      properties:
        strategyId:
          type: integer
        brokerId:
          type: integer
      required: [strategyId, brokerId]

    BotLog:
      type: object
      properties:
        id:
          type: integer
        level:
          type: string
          description: "info | warn | error | trade"
        message:
          type: string
        symbol:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        details:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, level, message, createdAt]

    # ── Positions ───────────────────────────────────────────────────
    Position:
      type: object
      properties:
        id:
          type: integer
        brokerId:
          type: integer
        brokerName:
          type: string
        symbol:
          type: string
        assetType:
          type: string
        side:
          type: string
          description: "long | short | long_call | long_put"
        quantity:
          type: number
        entryPrice:
          type: number
        currentPrice:
          type: ["number", "null"]
        marketValue:
          type: ["number", "null"]
        unrealizedPnl:
          type: ["number", "null"]
        unrealizedPnlPercent:
          type: ["number", "null"]
        strategyId:
          type: ["integer", "null"]
        openedAt:
          type: string
        optionType:
          type: ["string", "null"]
          description: "call | put"
        contractSymbol:
          type: ["string", "null"]
        strike:
          type: ["number", "null"]
        expiry:
          type: ["string", "null"]
        takeProfitPercent:
          type: ["number", "null"]
          description: "Strategy take-profit % used to compute target sell price"
        stopLossPercent:
          type: ["number", "null"]
